# Deploy: cd collab-server && fly launch (or fly deploy)
# Then set GitHub repo variable COLLAB_WS_URL = wss://<your-app-name>.fly.dev

app = 'kanban-board-collab'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
