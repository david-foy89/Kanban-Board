<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Task card wireframe</title>
  <desc id="desc">Task card with priority badge and action menu</desc>
  <rect width="480" height="320" fill="#fafafa"/>
  <text x="24" y="28" font-family="system-ui,sans-serif" font-size="11" fill="#52525b" font-weight="600">TASK CARD</text>
  <!-- Default state -->
  <g transform="translate(24,44)">
    <rect width="200" height="120" rx="8" fill="#fff" stroke="#d4d4d8"/>
    <rect x="12" y="12" width="48" height="14" rx="7" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="20" y="22" font-family="system-ui,sans-serif" font-size="7" fill="#b45309">MEDIUM</text>
    <circle cx="176" cy="18" r="10" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="176" y="21" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#71717a">ď</text>
    <rect x="12" y="36" width="140" height="10" rx="2" fill="#52525b"/>
    <rect x="12" y="54" width="168" height="6" rx="2" fill="#e4e4e7"/>
    <rect x="12" y="66" width="120" height="6" rx="2" fill="#e4e4e7"/>
    <text x="12" y="8" font-family="system-ui,sans-serif" font-size="8" fill="#a1a1aa">default</text>
  </g>
  <!-- Menu open -->
  <g transform="translate(256,44)">
    <rect width="200" height="120" rx="8" fill="#fff" stroke="#d4d4d8"/>
    <rect x="12" y="12" width="40" height="14" rx="7" fill="#ffe4e6" stroke="#f43f5e"/>
    <text x="18" y="22" font-family="system-ui,sans-serif" font-size="7" fill="#be123c">HIGH</text>
    <rect x="132" y="28" width="56" height="52" rx="6" fill="#fff" stroke="#a1a1aa" filter="drop-shadow(0 2px 4px rgba(0,0,0,.08))"/>
    <rect x="140" y="36" width="40" height="16" rx="2" fill="#f4f4f5"/>
    <text x="160" y="47" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#52525b">Edit</text>
    <rect x="140" y="56" width="40" height="16" rx="2" fill="#fff5f5"/>
    <text x="160" y="67" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#e11d48">Delete</text>
    <text x="12" y="8" font-family="system-ui,sans-serif" font-size="8" fill="#a1a1aa">menu open</text>
  </g>
  <!-- Edit form -->
  <g transform="translate(24,188)">
    <rect width="432" height="112" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="12" y="12" width="408" height="24" rx="4" fill="#fafafa" stroke="#d4d4d8"/>
    <text x="20" y="28" font-family="system-ui,sans-serif" font-size="8" fill="#a1a1aa">Task title</text>
    <rect x="12" y="44" width="408" height="36" rx="4" fill="#fafafa" stroke="#d4d4d8"/>
    <rect x="12" y="88" width="120" height="12" rx="2" fill="#ede9fe" stroke="#8b5cf6"/>
    <rect x="140" y="88" width="60" height="12" rx="2" fill="#f4f4f5" stroke="#d4d4d8"/>
    <rect x="208" y="88" width="60" height="12" rx="2" fill="#f4f4f5" stroke="#d4d4d8"/>
    <rect x="320" y="84" width="48" height="20" rx="4" fill="#8b5cf6"/>
    <text x="344" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#fff">Save</text>
    <text x="12" y="8" font-family="system-ui,sans-serif" font-size="8" fill="#7c3aed">inline edit form</text>
  </g>
</svg>
