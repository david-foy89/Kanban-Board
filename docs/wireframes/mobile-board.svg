<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 720" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Mobile board wireframe</title>
  <desc id="desc">Single column visible with horizontal snap scroll on mobile</desc>
  <rect width="390" height="720" fill="#fafafa"/>
  <!-- Phone frame -->
  <rect x="20" y="16" width="350" height="688" rx="28" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
  <rect x="155" y="28" width="80" height="6" rx="3" fill="#3f3f46"/>
  <!-- Screen -->
  <rect x="32" y="48" width="326" height="640" rx="4" fill="#09090b"/>
  <!-- Header -->
  <rect x="32" y="48" width="326" height="52" fill="#18181b"/>
  <rect x="48" y="68" width="100" height="10" rx="2" fill="#71717a"/>
  <rect x="48" y="84" width="160" height="6" rx="2" fill="#3f3f46"/>
  <!-- Column (full width visible) -->
  <rect x="44" y="112" width="302" height="520" rx="12" fill="#27272a" stroke="#52525b"/>
  <rect x="56" y="124" width="72" height="10" rx="2" fill="#a1a1aa"/>
  <rect x="56" y="140" width="40" height="6" rx="2" fill="#52525b"/>
  <rect x="56" y="160" width="278" height="80" rx="8" fill="#18181b" stroke="#3f3f46"/>
  <rect x="68" y="172" width="44" height="8" rx="4" fill="#52525b"/>
  <rect x="68" y="188" width="180" height="8" rx="2" fill="#71717a"/>
  <rect x="56" y="252" width="278" height="80" rx="8" fill="#18181b" stroke="#3f3f46"/>
  <rect x="56" y="400" width="278" height="100" rx="8" fill="#18181b" stroke="#52525b" stroke-dasharray="6 4"/>
  <text x="195" y="455" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#71717a">empty state</text>
  <rect x="56" y="580" width="278" height="40" rx="8" fill="#3f3f46"/>
  <text x="195" y="605" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a1a1aa">+ Add task</text>
  <!-- Peek next column -->
  <rect x="358" y="112" width="24" height="520" rx="8" fill="#27272a" stroke="#52525b" opacity="0.6"/>
  <text x="195" y="668" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#71717a"> swipe columns </text>
  <!-- Safe area -->
  <rect x="32" y="600" width="326" height="88" fill="url(#safe)" opacity="0.15"/>
  <defs>
    <linearGradient id="safe" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <text x="195" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#52525b">MOBILE Ṗ max-width column</text>
</svg>
