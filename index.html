<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Interactive Kanban board — drag tasks between columns, set priorities, and manage your workflow. Built with React."
    />
    <meta name="theme-color" content="#09090b" />
    <meta name="color-scheme" content="dark" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kanban Board" />
    <meta
      property="og:description"
      content="Interactive Kanban board with drag-and-drop, priorities, and persistent local storage."
    />
    <meta property="og:locale" content="en_US" />

    <title>Kanban Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background: #09090b;
        color: #fafafa;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .app-loading {
        display: flex;
        min-height: 100vh;
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.5rem;
        text-align: center;
      }

      .app-loading__spinner {
        width: 2rem;
        height: 2rem;
        border: 2px solid #3f3f46;
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: app-loading-spin 0.7s linear infinite;
      }

      .app-loading__title {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.025em;
      }

      .app-loading__text {
        margin: 0;
        font-size: 0.875rem;
        color: #71717a;
      }

      @keyframes app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .launch-help {
        max-width: 28rem;
        margin: 2rem auto;
        padding: 1.5rem;
        border: 1px solid #3f3f46;
        border-radius: 0.75rem;
        background: #18181b;
        color: #e4e4e7;
        font-size: 0.9375rem;
        line-height: 1.6;
      }

      .launch-help strong {
        color: #fafafa;
      }

      .launch-help pre {
        margin: 0.75rem 0;
        padding: 0.75rem;
        background: #09090b;
        border-radius: 0.5rem;
        color: #c4b5fd;
        overflow: auto;
      }

      .launch-help p {
        margin: 0.5rem 0 0;
        color: #71717a;
      }

      noscript {
        display: block;
        max-width: 28rem;
        margin: 2rem auto;
        padding: 1.25rem 1.5rem;
        border: 1px solid #3f3f46;
        border-radius: 0.75rem;
        background: #18181b;
        color: #e4e4e7;
        font-size: 0.9375rem;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <noscript>
      <strong>JavaScript is required.</strong> Enable JavaScript to run this Kanban board.
    </noscript>

    <div id="root">
      <div class="app-loading" role="status" aria-live="polite" aria-busy="true">
        <div class="app-loading__spinner" aria-hidden="true"></div>
        <p class="app-loading__title">Kanban Board</p>
        <p class="app-loading__text">Loading application…</p>
      </div>
    </div>

    <script>
      function showLaunchHelp(title, bodyHtml) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML =
          '<div class="launch-help"><strong>' +
          title +
          '</strong>' +
          bodyHtml +
          '</div>';
      }

      function showFileHelp() {
        showLaunchHelp(
          'Open index.html through the dev server',
          '<p>This app cannot run when the HTML file is opened directly from your computer.</p>' +
            '<pre>npm install\nnpm run dev</pre>' +
            '<p>Then open <strong style="color:#a78bfa">http://localhost:5173/index.html</strong></p>' +
            '<p>Or double-click <strong>start-dev.cmd</strong> in this folder.</p>',
        );
      }

      function showLoadTimeoutHelp() {
        showLaunchHelp(
          'App did not start',
          '<p>The dev server may not be running, or the wrong URL is open.</p>' +
            '<pre>npm run dev</pre>' +
            '<p>Use the URL from the terminal, for example:<br><strong style="color:#a78bfa">http://localhost:5173/index.html</strong></p>' +
            '<p>Do not use Live Server or open the file from Explorer.</p>',
        );
      }

      function showScriptError(message) {
        showLaunchHelp(
          'Script failed to load',
          '<p style="color:#fca5a5;word-break:break-word">' +
            message +
            '</p>' +
            '<pre>npm run dev</pre>' +
            '<p>Then open <strong style="color:#a78bfa">http://localhost:5173/index.html</strong></p>',
        );
      }

      window.__kanbanShowScriptError = showScriptError;
    </script>

    <!-- Vite processes this import on build; dev server compiles /src/main.tsx -->
    <script type="module">
      if (location.protocol === 'file:') {
        showFileHelp();
      } else {
        import('/src/main.tsx').catch(function (err) {
          var msg = err && err.message ? err.message : String(err);
          if (window.__kanbanShowScriptError) {
            window.__kanbanShowScriptError(msg);
          }
        });

        window.setTimeout(function () {
          if (!document.querySelector('[data-react-mounted]')) {
            showLoadTimeoutHelp();
          }
        }, 15000);
      }
    </script>
  </body>
</html>
